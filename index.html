<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>♥ AI 사업기획팀 ♥ 현황 보드</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{ --ink:#3a2f36; --muted:#a193a0; --line:#f1dbe5; --pink:#ec6f9e; --pink-deep:#d6336c; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Malgun Gothic",sans-serif;
    color:var(--ink); background:#ffffff; min-height:100vh; -webkit-font-smoothing:antialiased; padding:38px 22px 70px;}
  .wrap{max-width:660px; margin:0 auto;}
  .warn{background:#fff7e6; border:1px solid #f3dca0; color:#8a6d1e; border-radius:12px; padding:12px 14px; font-size:12.5px; line-height:1.5; margin-bottom:18px;}
  .warn b{color:#7a5a10;}
  .top{display:flex; align-items:flex-end; justify-content:space-between; gap:14px; margin-bottom:6px;}
  .title h1{font-size:27px; font-weight:800; letter-spacing:-.4px; color:var(--pink-deep);}
  .title p{color:var(--pink); font-size:14px; margin-top:8px; font-weight:600;}
  .clock{text-align:right; color:var(--muted); font-size:12.5px;}
  .clock b{display:block; color:var(--ink); font-size:19px; font-weight:800;}
  .clock .lunch{display:inline-block; margin-top:5px; background:#ffe3ef; color:#d6336c; font-weight:700; font-size:11px; padding:3px 9px; border-radius:999px;}
  .clock .live{display:inline-block; margin-top:5px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px;}
  .live.on{background:#e6f7ee; color:#1d9e60;} .live.off{background:#f3eef1; color:#a193a0;}
  .chips{display:flex; gap:18px; margin:22px 2px 6px; flex-wrap:wrap;}
  .chip{cursor:pointer; font-size:13px; color:var(--muted); font-weight:700; padding-bottom:6px; border-bottom:2px solid transparent; user-select:none; display:inline-flex; align-items:center; gap:6px;}
  .chip:hover{color:var(--pink-deep);} .chip.on{color:var(--pink-deep); border-bottom-color:var(--pink);}
  .chip .dot{width:7px; height:7px; border-radius:50%;} .chip b{font-weight:800;}
  .list{margin-top:6px;}
  .member{display:flex; align-items:flex-start; gap:16px; padding:20px 4px; cursor:pointer;}
  .member + .member{border-top:1px solid var(--line);}
  .avatar{width:58px; height:58px; border-radius:50%; overflow:hidden; flex:none; background:#fff; border:2.5px solid var(--c,var(--pink));}
  .avatar img{width:100%; height:100%; object-fit:cover;}
  .info{flex:1; min-width:0;}
  .name{font-weight:800; font-size:17.5px; letter-spacing:-.3px;}
  .member:hover .name{color:var(--pink-deep);}
  .statusline{margin-top:6px; font-size:13.5px; font-weight:700; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .statusline .dot{width:9px; height:9px; border-radius:50%; background:var(--c);}
  .statusline .st{color:var(--c); font-weight:800;} .statusline .sub{color:#7a6670; font-weight:700;}
  .saying{margin-top:11px; font-size:15px; color:#86596b; font-weight:600; line-height:1.45;}
  .saying .q{color:var(--pink); margin-right:6px;} .saying .ph{color:#cdb3bf; font-weight:500;}
  .time{flex:none; color:#c2adb6; font-size:11.5px; padding-top:4px;}
  .foot{margin-top:30px; color:#b69aa6; font-size:12px; line-height:1.6;} .foot b{color:var(--pink-deep);}
  .chat{margin-top:34px; border-top:1px solid var(--line); padding-top:22px;}
  .chat-title{font-weight:800; font-size:16px; color:var(--pink-deep); margin-bottom:14px;}
  .chat-log{display:flex; flex-direction:column; gap:10px; max-height:330px; overflow-y:auto; margin-bottom:12px; padding-right:4px;}
  .bubble{align-self:flex-start; max-width:82%; background:#fdf0f6; border:1px solid #f3d8e6; border-radius:14px; padding:9px 13px; font-size:14px; color:#5b4a52; line-height:1.45;}
  .bubble img{max-width:100%; border-radius:10px; display:block; margin-top:6px;} .bubble .bt{font-size:10.5px; color:#c2adb6; margin-top:5px;}
  .chat-empty{color:#cdb3bf; font-size:13px; padding:8px 0;}
  .chat-input{display:flex; gap:8px; align-items:center;}
  .chat-input input[type=text]{flex:1; border:1.5px solid var(--line); border-radius:999px; padding:11px 16px; font:inherit; font-size:14px; outline:0;}
  .chat-input input[type=text]:focus{border-color:var(--pink);}
  .att{border:1.5px solid var(--line); background:#fff; border-radius:50%; width:42px; height:42px; cursor:pointer; font-size:17px; flex:none;}
  .send{border:0; background:var(--pink); color:#fff; font:inherit; font-weight:700; padding:11px 18px; border-radius:999px; cursor:pointer; flex:none;}
  .att-preview img{max-height:90px; border-radius:10px; border:1px solid var(--line); vertical-align:middle;}
  .att-preview button{margin-left:8px; background:#f6e8ef; border:0; border-radius:8px; padding:6px 10px; cursor:pointer; font:inherit; font-size:12px; color:#8a6670;}
  .chat-who{display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap;}
  .chat-who .who-label{font-size:12.5px; color:#a88e98; margin-right:2px;}
  .chat-who button{border:1.5px solid var(--line); background:#fff; border-radius:999px; padding:6px 15px; font:inherit; font-size:13px; cursor:pointer; color:#8a6670;}
  .chat-who button.on{border-color:var(--pink); background:var(--pink); color:#fff; font-weight:700;}
  .bubble .who{font-weight:800; font-size:12px; color:var(--pink-deep); margin-bottom:3px;}
  .ov{position:fixed; inset:0; background:rgba(80,30,55,.4); display:none; align-items:center; justify-content:center; padding:20px; z-index:50;}
  .ov.open{display:flex;}
  .modal{background:#fff; border-radius:18px; width:100%; max-width:400px; padding:22px; box-shadow:0 24px 60px rgba(120,30,70,.3);}
  .mhead{display:flex; align-items:center; gap:12px; margin-bottom:16px;}
  .mhead .avatar{width:52px; height:52px;}
  .mhead h3{font-size:17px; font-weight:800;} .mhead .sub{color:var(--muted); font-size:12px; margin-top:2px;}
  .modal label{display:block; font-size:12.5px; font-weight:700; color:#7a6670; margin:15px 0 7px;}
  .opts{display:grid; gap:7px;}
  .opts button{border:1.5px solid var(--line); background:#fff; border-radius:11px; padding:10px 4px; cursor:pointer; font:inherit; font-size:12.5px; font-weight:700; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:5px;}
  .opts button .d{width:9px; height:9px; border-radius:50%;}
  .modal textarea{width:100%; border:1.5px solid var(--line); border-radius:11px; padding:11px 12px; font:inherit; font-size:14px; resize:none; outline:0;} .modal textarea:focus{border-color:var(--pink);}
  .mbtns{display:flex; gap:8px; margin-top:20px;}
  .mbtns .btn{flex:1; border:0; background:var(--pink); color:#fff; font:inherit; font-weight:700; font-size:13px; padding:12px 14px; border-radius:11px; cursor:pointer;}
  .ghost{background:#f6e8ef !important; color:#8a6670 !important;}
</style>
</head>
<body>
<div class="wrap">
  <div id="warn" class="warn" style="display:none"></div>
  <div class="top">
    <div class="title"><h1>♥ AI 사업기획팀 ♥</h1></div>
    <div class="clock"><b id="clk">--:--</b><span id="cdate"></span><br><span class="lunch" id="lunchTag" style="display:none">🍱 점심시간</span><span class="live off" id="liveTag">● 오프라인</span></div>
  </div>
  <div class="chips" id="chips"></div>
  <div class="list" id="list"></div>
  <div class="foot">이름을 누르면 상태 · 오늘의 한마디를 바꿀 수 있어요 · 12:00~13:00은 자동 점심시간 🍱</div>
  <div class="chat">
    <div class="chat-title" id="chatTitle">💬 수다방</div>
    <div class="chat-log" id="chatLog"></div>
    <div id="attPreview" class="att-preview" style="display:none"></div>
    <div class="chat-who" id="chatWho"></div>
    <div class="chat-input">
      <button class="att" id="attBtn" title="이미지 첨부">📷</button>
      <input type="file" id="attFile" accept="image/*" style="display:none">
      <input type="text" id="chatText" placeholder="메시지 입력 (사진은 Ctrl+V로 붙여넣기 가능)…">
      <button class="send" id="sendBtn">전송</button>
    </div>
  </div>
</div>

<div class="ov" id="ov">
  <div class="modal">
    <div class="mhead"><div class="avatar"><img id="mFace" src="" alt=""></div><div><h3 id="mTitle"></h3><div class="sub" id="mSub"></div></div></div>
    <label>상태</label>
    <div class="opts" id="stsel" style="grid-template-columns:repeat(3,1fr)"></div>
    <div id="subWrap" style="display:none"><label id="subLabel">세부</label><div class="opts" id="subsel"></div></div>
    <label>오늘 한마디 💬</label>
    <textarea id="mMsg" rows="2" placeholder="오늘 하고 싶은 말 한마디!"></textarea>
    <div class="mbtns"><button class="btn ghost" id="mCancel">취소</button><button class="btn" id="mSave">저장</button></div>
  </div>
</div>

const STATUSES = { working:"업무중", meeting:"회의중", resting:"휴식중" };
const STCOLOR = { working:"#6fa8dc", meeting:"#a98fda", resting:"#f2906b" };
const SUB = {
  working: { busy:{l:"완전바쁨",e:"🔥",c:"#e5586e"}, angry:{l:"개빡침",e:"🤬",c:"#c0392b"}, peace:{l:"평화로움",e:"😌",c:"#6fa8dc"} },
  resting: { coffee:{l:"커피",e:"☕",c:"#b5836a"}, walk:{l:"산책",e:"🌳",c:"#7ba7b5"}, lounge:{l:"휴게실",e:"🛋️",c:"#a98fda"} },
};
const SUBLABEL = { working:"지금 상태", resting:"휴식 종류" };
const SEED = {
  u1:{name:"하이슬", status:"working", sub:"busy",   msg:"오늘 너무 바빠.....", order:1},
  u2:{name:"신지영", status:"meeting", sub:null,     msg:"월루중", order:2},
  u3:{name:"정서연", status:"resting", sub:"coffee", msg:"사장님 나빠요", order:3},
};

let DATA=[], CHAT=[], filter="all", editId=null, editStatus=null, editSub=null, pendingImg=null;
const NAMES=["하이슬","신지영","정서연"]; let chatAuthor=NAMES[0];
const configured = !String(firebaseConfig.apiKey).startsWith("PASTE");
let db=null;

function isLunch(){ const h=new Date().getHours(); return h>=12 && h<13; }
function eff(m){ return isLunch()? "lunch" : m.status; }
function ago(ts){ if(!ts) return ""; const m=Math.floor((Date.now()-ts)/60000); if(m<1) return "방금"; if(m<60) return m+"분 전"; const h=Math.floor(m/60); if(h<24) return h+"시간 전"; return Math.floor(h/24)+"일 전"; }
function hm(ts){ const d=new Date(ts||Date.now()); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function esc(t){ return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function visual(m){
  const ek=eff(m);
  if(ek==="lunch")   return {face:"sleeping", label:"점심시간", c:"#ec6f9e"};
  if(ek==="meeting") return {face:"thinking", label:"회의중",  c:"#a98fda"};
  if(ek==="resting"){ const s=SUB.resting[m.sub]||SUB.resting.coffee; return {face:"happy", label:"휴식중", c:"#f2906b", sub:s}; }
  const sk=(m.sub in SUB.working)? m.sub : "peace"; const s=SUB.working[sk];
  return {face: (sk==="busy"||sk==="angry")?"error":"typing", label:"업무중", c: s.c, sub:s};
}
function renderChips(){
  const order={all:"전체", working:"업무중", meeting:"회의중", resting:"휴식중", lunch:"점심시간"};
  const colorOf={working:"#6fa8dc",meeting:"#a98fda",resting:"#f2906b",lunch:"#ec6f9e"};
  const cnt={all:DATA.length, working:0,meeting:0,resting:0,lunch:0}; DATA.forEach(m=>{cnt[eff(m)]=(cnt[eff(m)]||0)+1;});
  const el=document.getElementById("chips"); el.innerHTML="";
  for(const k in order){ const c=document.createElement("div"); c.className="chip"+(filter===k?" on":"");
    c.innerHTML=(colorOf[k]?'<span class="dot" style="background:'+colorOf[k]+'"></span>':"")+order[k]+' <b>'+(cnt[k]||0)+'</b>';
    c.onclick=()=>{filter=k; render();}; el.appendChild(c); }
}
function render(){
  document.getElementById("lunchTag").style.display = isLunch()? "inline-block":"none";
  renderChips();
  const wrap=document.getElementById("list"); wrap.innerHTML="";
  const list=DATA.filter(m=> filter==="all"||eff(m)===filter);
  for(const m of list){
    const v=visual(m); const row=document.createElement("div"); row.className="member"; row.style.setProperty("--c",v.c);
    const subTxt = v.sub? '<span class="sub">· '+v.sub.e+' '+v.sub.l+'</span>' : "";
    const msgTxt = m.msg? esc(m.msg) : '<span class="ph">오늘 한마디를 남겨보세요</span>';
    row.innerHTML='<div class="avatar"><img src="'+FACES[v.face]+'" alt=""></div>'+
      '<div class="info"><div class="name">'+esc(m.name)+'</div>'+
      '<div class="statusline"><span class="dot"></span><span class="st">'+v.label+'</span>'+subTxt+'</div>'+
      '<div class="saying"><span class="q">💬</span>'+msgTxt+'</div></div>'+
      '<div class="time">'+ago(m.updated)+'</div>';
    row.onclick=()=>openEdit(m.id); wrap.appendChild(row);
  }
  if(!list.length){ wrap.innerHTML='<div style="color:#c9b3bd;padding:40px 0;text-align:center">표시할 팀원이 없어요.</div>'; }
}
function renderChat(){
  const log=document.getElementById("chatLog");
  if(!CHAT.length){ log.innerHTML='<div class="chat-empty">아직 메시지가 없어요. 첫 글을 남겨보세요!</div>'; return; }
  log.innerHTML="";
  for(const c of CHAT){ const b=document.createElement("div"); b.className="bubble";
    b.innerHTML=(c.who?('<div class="who">'+esc(c.who)+'</div>'):"")+(c.text?("<div>"+esc(c.text)+"</div>"):"")+(c.img?('<img src="'+c.img+'">'):"")+'<div class="bt">'+hm(c.t)+'</div>';
    log.appendChild(b); }
  log.scrollTop=log.scrollHeight;
}

/* ---- modal ---- */
function previewFace(){ const f = editStatus==="meeting"?"thinking" : editStatus==="resting"?"happy" : ((editSub==="busy"||editSub==="angry")?"error":"typing"); document.getElementById("mFace").src=FACES[f]; }
function drawModal(){
  const ss=document.getElementById("stsel"); ss.innerHTML="";
  for(const k in STATUSES){ const b=document.createElement("button"); b.innerHTML='<span class="d" style="background:'+STCOLOR[k]+'"></span>'+STATUSES[k];
    if(k===editStatus){ b.style.borderColor=STCOLOR[k]; b.style.background=STCOLOR[k]+"1a"; b.style.color="#3a2f36"; }
    b.onclick=()=>{ editStatus=k; const o=SUB[k]; editSub=o?((editSub in o)?editSub:Object.keys(o)[0]):null; drawModal(); }; ss.appendChild(b); }
  const opts=SUB[editStatus]; document.getElementById("subWrap").style.display=opts?"block":"none";
  if(opts){ document.getElementById("subLabel").textContent=SUBLABEL[editStatus];
    const bs=document.getElementById("subsel"); bs.style.gridTemplateColumns="repeat("+Object.keys(opts).length+",1fr)"; bs.innerHTML="";
    for(const k in opts){ const o=opts[k]; const btn=document.createElement("button"); btn.innerHTML='<span style="font-size:15px">'+o.e+'</span>'+o.l;
      if(k===editSub){ btn.style.borderColor=o.c; btn.style.background=o.c+"1a"; btn.style.color=o.c; }
      btn.onclick=()=>{ editSub=k; drawModal(); }; bs.appendChild(btn); } }
  previewFace();
}
function openEdit(id){ const m=DATA.find(x=>String(x.id)===String(id)); if(!m) return; editId=m.id; editStatus=m.status; editSub=m.sub;
  document.getElementById("mTitle").textContent=m.name;
  document.getElementById("mSub").textContent = isLunch()? "지금은 자동 점심시간 — 13시 이후 이 상태로 표시돼요":"상태를 골라주세요";
  document.getElementById("mMsg").value=m.msg||""; drawModal(); document.getElementById("ov").classList.add("open"); }
function saveEdit(){
  const patch={status:editStatus, sub:editSub||null, msg:document.getElementById("mMsg").value.trim(), updated:Date.now()};
  if(db){ db.ref("members/"+editId).update(patch); }
  else { const m=DATA.find(x=>String(x.id)===String(editId)); if(m) Object.assign(m,patch); render(); }
  closeModal();
}
document.getElementById("mSave").onclick=saveEdit;
document.getElementById("mCancel").onclick=closeModal;
document.getElementById("ov").onclick=(e)=>{ if(e.target.id==="ov") closeModal(); };
function closeModal(){ document.getElementById("ov").classList.remove("open"); }

/* ---- chat ---- */
function compress(file, cb){ const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{ const max=900; let w=img.width,h=img.height; const s=Math.min(1,max/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s); const cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h); cb(cv.toDataURL("image/jpeg",0.72)); }; img.src=r.result; }; r.readAsDataURL(file); }
function clearAtt(){ pendingImg=null; const p=document.getElementById("attPreview"); p.style.display="none"; p.innerHTML=""; }
function showAtt(d){ pendingImg=d; const p=document.getElementById("attPreview"); p.style.display="block"; p.innerHTML='<img src="'+d+'"><button id="attCancel">취소</button>'; document.getElementById("attCancel").onclick=clearAtt; }
function renderWho(){ const w=document.getElementById("chatWho"); w.innerHTML='<span class="who-label">누구로 남길까요?</span>';
  NAMES.forEach(n=>{ const b=document.createElement("button"); b.textContent=n; if(n===chatAuthor) b.className="on";
    b.onclick=()=>{ chatAuthor=n; renderWho(); }; w.appendChild(b); }); }
function setChatTitle(){ const d=new Date(); document.getElementById("chatTitle").textContent="💬 "+(d.getMonth()+1)+"월 "+d.getDate()+"일 수다방"; }
function sendChat(){ const t=document.getElementById("chatText"); const txt=t.value.trim(); if(!txt && !pendingImg) return;
  const msg={who:chatAuthor, text:txt||null, img:pendingImg||null, t:Date.now()};
  if(db){ db.ref("chat").push(msg); } else { CHAT.push(msg); renderChat(); }
  t.value=""; clearAtt(); }
document.getElementById("sendBtn").onclick=sendChat;
document.getElementById("chatText").addEventListener("keydown",e=>{ if(e.key==="Enter") sendChat(); });
document.getElementById("attBtn").onclick=()=>document.getElementById("attFile").click();
document.getElementById("attFile").onchange=(e)=>{ const f=e.target.files[0]; if(!f) return; compress(f,showAtt); e.target.value=""; };
document.getElementById("chatText").addEventListener("paste",(e)=>{
  const items=(e.clipboardData||window.clipboardData)?.items; if(!items) return;
  for(const it of items){ if(it.type && it.type.indexOf("image")===0){ const f=it.getAsFile(); if(f){ e.preventDefault(); compress(f,showAtt); } return; } } });

/* ---- init / sync ---- */
function clock(){ const d=new Date(); document.getElementById("clk").textContent=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
  const wk=["일","월","화","수","목","금","토"][d.getDay()]; document.getElementById("cdate").textContent=d.getFullYear()+". "+(d.getMonth()+1)+". "+d.getDate()+" ("+wk+")"; setChatTitle(); }

function start(){
  clock(); renderWho(); setInterval(()=>{ clock(); render(); }, 30000);
  const live=document.getElementById("liveTag");
  if(configured){
    firebase.initializeApp(firebaseConfig); db=firebase.database();
    live.className="live on"; live.textContent="● 실시간 연결됨";
    db.ref("members").on("value", snap=>{
      const v=snap.val();
      if(!v){ db.ref("members").set(SEED); return; }
      DATA=Object.keys(v).map(k=>Object.assign({id:k}, v[k])).sort((a,b)=>(a.order||0)-(b.order||0)); render();
    });
    db.ref("chat").on("value", snap=>{ const v=snap.val()||{}; CHAT=Object.keys(v).map(k=>Object.assign({id:k}, v[k])).sort((a,b)=>(a.t||0)-(b.t||0)); renderChat(); });
  } else {
    document.getElementById("warn").style.display="block";
    document.getElementById("warn").innerHTML="⚠ <b>Firebase 설정 전</b> — 지금은 미리보기(이 브라우저 전용)예요. 아래 코드의 <b>firebaseConfig</b>에 콘솔 설정을 붙여넣으면 팀원과 <b>실시간 공유</b>됩니다.";
    DATA=Object.keys(SEED).map(k=>Object.assign({id:k}, SEED[k], {updated:Date.now()})).sort((a,b)=>a.order-b.order);
    render(); renderChat();
  }
}
start();
</script>
